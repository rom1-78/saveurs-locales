name: CD Pipeline

on:
  push:
    branches: [test, main]

jobs:
  # Deploy vers staging (branche test)
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/test'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - run: npm run build
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/saveurs_locales' }}
          NEXTAUTH_URL: ${{ secrets.STAGING_NEXTAUTH_URL || 'http://localhost:3000' }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'placeholder-secret' }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || 'sk_test_placeholder' }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY || 'pk_test_placeholder' }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET || 'whsec_placeholder' }}
      - name: Deploy to staging
        run: echo "Deploy to staging server via SSH or Docker"
        # Remplacer par la vraie commande de deploy :
        # ssh user@${{ secrets.STAGING_HOST }} "cd /var/www && git pull && npm ci && pm2 restart"

  # Deploy vers production (branche main)
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - run: npm run build
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/saveurs_locales' }}
          NEXTAUTH_URL: ${{ secrets.PROD_NEXTAUTH_URL || 'http://localhost:3000' }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'placeholder-secret' }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || 'sk_test_placeholder' }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY || 'pk_test_placeholder' }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET || 'whsec_placeholder' }}
      - name: Deploy to production
        run: echo "Deploy to production server via SSH or Docker"
        # Remplacer par la vraie commande de deploy :
        # ssh user@${{ secrets.PROD_HOST }} "cd /var/www && git pull && npm ci && pm2 restart"
      - name: Health check
        run: echo "Health check placeholder - configure with real URL"
        # Remplacer par : curl -f ${{ secrets.PROD_NEXTAUTH_URL }}/api/health || exit 1
