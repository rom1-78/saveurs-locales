name: CD Pipeline

on:
  push:
    branches: [test, main]

jobs:
  # Deploy vers staging (branche test)
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/test'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging
        run: |
          echo "Staging deployment triggered"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          # Quand le serveur staging sera prêt, décommenter :
          # ssh user@$STAGING_HOST "cd /var/www && git pull && npm ci && npm run build && pm2 restart"
          # OU avec Docker :
          # ssh user@$STAGING_HOST "docker compose pull && docker compose up -d"
        # env:
        #   STAGING_HOST: ${{ secrets.STAGING_HOST }}

  # Deploy vers production (branche main)
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production
        run: |
          echo "Production deployment triggered"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          # Quand le serveur prod sera prêt, décommenter :
          # ssh user@$PROD_HOST "cd /var/www && git pull && npm ci && npm run build && pm2 restart"
          # OU avec Docker :
          # ssh user@$PROD_HOST "docker compose pull && docker compose up -d"
        # env:
        #   PROD_HOST: ${{ secrets.PROD_HOST }}
      - name: Health check
        run: |
          echo "Health check placeholder"
          # Quand le serveur sera prêt :
          # curl -f ${{ secrets.PROD_URL }}/api/health || exit 1
